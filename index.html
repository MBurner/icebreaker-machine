
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  #app {
    font-family: 'Nunito', sans-serif;
    min-height: 600px;
    background: #0f0e17;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  #app::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, #3b1f6e44 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #1f4e3b44 0%, transparent 60%);
    pointer-events: none;
  }

  h1 {
    font-family: 'Boogaloo', cursive;
    font-size: 2rem;
    color: #fff;
    letter-spacing: 1px;
    text-align: center;
    z-index: 1;
  }

  h1 span { color: #f7c948; }

  .subtitle {
    font-size: 13px;
    color: #aaa;
    text-align: center;
    z-index: 1;
    margin-top: -1rem;
  }

  .cards-row {
    display: flex;
    gap: 1rem;
    align-items: center;
    z-index: 1;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card-wrapper { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }

  .card {
    width: 145px;
    height: 190px;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 1rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    border: 2.5px solid rgba(255,255,255,0.15);
    text-align: center;
    user-select: none;
  }

  .card:hover { transform: translateY(-4px) rotate(-1deg); }

  .card.flip { animation: flipCard 0.4s ease; }

  @keyframes flipCard {
    0% { transform: rotateY(0); }
    50% { transform: rotateY(90deg) scale(0.9); }
    100% { transform: rotateY(0); }
  }

  .card-a { background: linear-gradient(135deg, #6c3bce, #a855f7); }
  .card-b { background: linear-gradient(135deg, #1a7f5a, #34d399); }

  .card-emoji { font-size: 2.4rem; line-height: 1; }
  .card-text { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.3; }
  .card-tag {
    position: absolute;
    top: 8px; right: 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
  }

  .swap-btn {
    font-size: 11px;
    font-weight: 700;
    color: #ccc;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 4px 14px;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.3px;
  }
  .swap-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }

  .connector {
    font-size: 2rem;
    color: #f7c948;
    font-family: 'Boogaloo', cursive;
    z-index: 1;
    flex-shrink: 0;
  }

  .icebreaker-box {
    background: rgba(247, 201, 72, 0.12);
    border: 2px solid #f7c948;
    border-radius: 16px;
    padding: 1.2rem 1.5rem;
    max-width: 420px;
    width: 100%;
    z-index: 1;
    text-align: center;
  }

  .icebreaker-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #f7c948;
    margin-bottom: 6px;
  }

  .icebreaker-text {
    font-size: 15px;
    color: #fff;
    font-weight: 700;
    line-height: 1.5;
  }

  .swipe-row {
    display: flex;
    gap: 1.5rem;
    z-index: 1;
  }

  .swipe-btn {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .swipe-btn:hover { transform: scale(1.12); }
  .swipe-btn.nope { background: #e2434344; border: 2.5px solid #e24343; }
  .swipe-btn.win { background: #34d39933; border: 2.5px solid #34d399; }
  .swipe-btn:active { transform: scale(0.95); }

  .stats-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 1rem 1.5rem;
    max-width: 420px;
    width: 100%;
    z-index: 1;
    display: flex;
    gap: 1rem;
    justify-content: space-around;
    flex-wrap: wrap;
  }

  .stat { text-align: center; }
  .stat-num { font-family: 'Boogaloo', cursive; font-size: 1.8rem; color: #fff; line-height: 1; }
  .stat-label { font-size: 11px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .stat-num.green { color: #34d399; }
  .stat-num.red { color: #e24343; }
  .stat-num.yellow { color: #f7c948; }

  .toast {
    position: fixed;
    top: 1.5rem; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #f7c948;
    color: #0f0e17;
    font-weight: 900;
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    padding: 0.6rem 1.5rem;
    border-radius: 40px;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .reshuffle-btn {
    font-family: 'Boogaloo', cursive;
    font-size: 1rem;
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    padding: 0.5rem 1.4rem;
    cursor: pointer;
    z-index: 1;
    letter-spacing: 0.5px;
    transition: background 0.15s;
  }
  .reshuffle-btn:hover { background: rgba(255,255,255,0.15); }
</style>

<div id="app">
  <h1>Ice<span>breaker</span> Machine 🎰</h1>
  <p class="subtitle">Zwei Karten. Ein Einstieg. Los geht's, Brudi.</p>

  <div class="cards-row">
    <div class="card-wrapper">
      <div class="card card-a" id="card-a">
        <span class="card-tag">Thema</span>
        <div class="card-emoji" id="emoji-a"></div>
        <div class="card-text" id="text-a"></div>
      </div>
      <button class="swap-btn" onclick="swapCard('a')">↺ neue Karte</button>
    </div>

    <div class="connector">+</div>

    <div class="card-wrapper">
      <div class="card card-b" id="card-b">
        <span class="card-tag">Twist</span>
        <div class="card-emoji" id="emoji-b"></div>
        <div class="card-text" id="text-b"></div>
      </div>
      <button class="swap-btn" onclick="swapCard('b')">↺ neue Karte</button>
    </div>
  </div>

  <div class="icebreaker-box">
    <div class="icebreaker-label">Dein Icebreaker</div>
    <div class="icebreaker-text" id="icebreaker-text">Lädt...</div>
  </div>

  <div class="swipe-row">
    <button class="swipe-btn nope" onclick="swipe(false)" title="Hat nicht geklappt">✕</button>
    <button class="swipe-btn win" onclick="swipe(true)" title="Hat geklappt">✓</button>
  </div>

  <div class="stats-box">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Anrufe</div>
    </div>
    <div class="stat">
      <div class="stat-num green" id="stat-wins">0</div>
      <div class="stat-label">Geklappt</div>
    </div>
    <div class="stat">
      <div class="stat-num red" id="stat-nopes">0</div>
      <div class="stat-label">Nicht geklappt</div>
    </div>
    <div class="stat">
      <div class="stat-num yellow" id="stat-rate">–</div>
      <div class="stat-label">Win Rate</div>
    </div>
  </div>

  <button class="reshuffle-btn" onclick="reshuffleAll()">🎲 Neu mischen</button>
</div>

<div class="toast" id="toast"></div>

<script>
const cardsA = [
  { emoji: '🏄', text: 'Surfen im Urlaub' },
  { emoji: '🍕', text: 'Mittagessen Drama' },
  { emoji: '🎮', text: 'Gaming bis 3 Uhr' },
  { emoji: '🐕', text: 'Hund versteht mich nicht' },
  { emoji: '☕', text: '5. Kaffee des Tages' },
  { emoji: '🚗', text: 'Stau-Philosophie' },
  { emoji: '🌧️', text: 'Regenwetter-Experte' },
  { emoji: '🎸', text: 'Hobby-Gitarrist (schlecht)' },
  { emoji: '🍜', text: 'Nudeln every single day' },
  { emoji: '🧦', text: 'Socken-Mysterium' },
  { emoji: '🏃', text: 'Montags-Jogger' },
  { emoji: '📱', text: 'Doomscrolling pro' },
  { emoji: '🌮', text: 'Taco-Weltanschauung' },
  { emoji: '🎯', text: 'Ziellos im Supermarkt' },
  { emoji: '🦆', text: 'Enten-Sympathisant' },
];

const cardsB = [
  { emoji: '🤔', text: '...hat mich aber eh mehr interessiert als mein eigentlicher Plan' },
  { emoji: '😅', text: '...deswegen bin ich heute etwas philosophisch drauf' },
  { emoji: '🔥', text: '...macht mich irgendwie produktiver, keine Ahnung warum' },
  { emoji: '🙈', text: '...aber niemand muss das wissen' },
  { emoji: '🎉', text: '...und damit haben Sie heute das Highlight meines Tages getroffen' },
  { emoji: '🌀', text: '...ich musste kurz nachdenken, ob ich das wirklich mache' },
  { emoji: '🚀', text: '...darüber könnte ich eine Stunde reden' },
  { emoji: '💡', text: '...das war übrigens mein bestes Entscheidung seit Wochen' },
  { emoji: '😂', text: '...mein Kollege hält mich deshalb für verrückt' },
  { emoji: '🏆', text: '...und darin bin ich unschlagbar, ehrlich gesagt' },
];

let idxA = 0, idxB = 0;
let wins = 0, nopes = 0;

function pickRandom(arr, exclude) {
  let idx;
  do { idx = Math.floor(Math.random() * arr.length); } while (idx === exclude && arr.length > 1);
  return idx;
}

function updateIcebreaker() {
  const a = cardsA[idxA];
  const b = cardsB[idxB];
  document.getElementById('icebreaker-text').textContent =
    `"Hey, ich hab heute morgen kurz an ${a.text} gedacht – ${b.text}. Aber genug von mir, ich wollte Sie kurz zu [Thema] ansprechen..."`;
}

function renderCards() {
  const a = cardsA[idxA], b = cardsB[idxB];
  document.getElementById('emoji-a').textContent = a.emoji;
  document.getElementById('text-a').textContent = a.text;
  document.getElementById('emoji-b').textContent = b.emoji;
  document.getElementById('text-b').textContent = b.text;
  updateIcebreaker();
}

function flipAnim(el, cb) {
  el.classList.add('flip');
  setTimeout(() => { cb(); el.classList.remove('flip'); }, 400);
}

function swapCard(which) {
  if (which === 'a') {
    const el = document.getElementById('card-a');
    flipAnim(el, () => { idxA = pickRandom(cardsA, idxA); renderCards(); });
  } else {
    const el = document.getElementById('card-b');
    flipAnim(el, () => { idxB = pickRandom(cardsB, idxB); renderCards(); });
  }
}

function reshuffleAll() {
  idxA = pickRandom(cardsA, idxA);
  idxB = pickRandom(cardsB, idxB);
  ['card-a','card-b'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.add('flip');
    setTimeout(() => el.classList.remove('flip'), 400);
  });
  setTimeout(renderCards, 200);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function swipe(success) {
  if (success) { wins++; showToast('Nice, hat geklappt! 🔥'); }
  else { nopes++; showToast('Schade – weiter geht\'s! 💪'); }
  updateStats();
  setTimeout(reshuffleAll, 600);
}

function updateStats() {
  const total = wins + nopes;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-wins').textContent = wins;
  document.getElementById('stat-nopes').textContent = nopes;
  document.getElementById('stat-rate').textContent = total > 0 ? Math.round((wins / total) * 100) + '%' : '–';
}

idxA = Math.floor(Math.random() * cardsA.length);
idxB = Math.floor(Math.random() * cardsB.length);
renderCards();
</script>
